<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>My First App</title>
</head>
<body>
    <h1>欢迎使用我的第一个程序 🎉</h1>

    <input type="text" id="nameInput" placeholder="输入你的名字">
    <button onclick="sayHello()">点击打招呼</button>

    <p id="result"></p>

    <script>
        function sayHello() {
            var name = document.getElementById("nameInput").value;

            if (name === "") {
                document.getElementById("result").innerText = "请输入名字哦 😄";
            } else {
                document.getElementById("result").innerText = "Hello, " + name + " 👋";
            }
        }
    </script>
</body>
</html>
