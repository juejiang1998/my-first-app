<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>币安 U本位 USDT 合约 Top30 可视化</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #0b1020;
      color: #e5e7eb;
    }
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 30px;
      font-weight: 800;
    }
    .sub {
      color: #94a3b8;
      margin-bottom: 18px;
      line-height: 1.6;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 18px;
    }
    button, select {
      background: #111827;
      color: #e5e7eb;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      background: #2563eb;
      border: none;
    }
    button:hover {
      background: #1d4ed8;
    }
    .status {
      color: #93c5fd;
      margin-bottom: 16px;
      min-height: 24px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 18px;
    }
    .label {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .value {
      font-size: 28px;
      font-weight: 800;
    }
    .charts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }
    .panel {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 18px;
      padding: 18px;
    }
    .panel h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }
    .canvas-box {
      position: relative;
      width: 100%;
      height: 520px;
    }
    .footer {
      color: #64748b;
      font-size: 12px;
      margin-top: 14px;
      line-height: 1.6;
    }
    @media (max-width: 980px) {
      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .canvas-box {
        height: 420px;
      }
    }
    @media (max-width: 640px) {
      .cards {
        grid-template-columns: 1fr;
      }
      .canvas-box {
        height: 360px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>币安 U本位 USDT 合约 Top30 可视化</h1>
    <div class="sub">
      仅展示 <strong>USDT 交易对</strong>、且状态为 <strong>TRADING</strong> 的 U 本位合约；
      排序规则为 <strong>24h 成交额（quoteVolume）前 30</strong>。
    </div>

    <div class="toolbar">
      <select id="topN">
        <option value="30" selected>Top 30</option>
        <option value="20">Top 20</option>
        <option value="10">Top 10</option>
      </select>
      <button id="refreshBtn">刷新数据</button>
    </div>

    <div id="status" class="status">准备加载...</div>

    <div class="cards">
      <div class="card">
        <div class="label">USDT 交易对数量</div>
        <div id="usdtCount" class="value">-</div>
      </div>
      <div class="card">
        <div class="label">纳入可视化数量</div>
        <div id="topCount" class="value">-</div>
      </div>
      <div class="card">
        <div class="label">Top1 交易对</div>
        <div id="topSymbol" class="value">-</div>
      </div>
      <div class="card">
        <div class="label">最后刷新时间</div>
        <div id="lastUpdate" class="value" style="font-size:18px;">-</div>
      </div>
    </div>

    <div class="charts">
      <div class="panel">
        <h2>Top 合约 24h 成交额</h2>
        <div class="canvas-box">
          <canvas id="volumeChart"></canvas>
        </div>
      </div>

      <div class="panel">
        <h2>Top 合约 24h 涨跌幅</h2>
        <div class="canvas-box">
          <canvas id="changeChart"></canvas>
        </div>
      </div>

      <div class="panel">
        <h2>成交额 vs 涨跌幅</h2>
        <div class="canvas-box">
          <canvas id="scatterChart"></canvas>
        </div>
      </div>
    </div>

    <div class="footer">
      数据源：Binance USDⓈ-M Futures 公开 REST 接口。若浏览器对本地 <code>file://</code> 请求有限制，
      建议用本地静态服务方式打开。
    </div>
  </div>

  <script>
    const API_BASE = "https://fapi.binance.com";

    let volumeChart = null;
    let changeChart = null;
    let scatterChart = null;
    let filteredRows = [];

    function toNum(v) {
      const n = Number(v);
      return Number.isFinite(n) ? n : 0;
    }

    function formatMoney(v) {
      const n = toNum(v);
      if (n >= 1e9) return (n / 1e9).toFixed(2) + "B";
      if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
      if (n >= 1e3) return (n / 1e3).toFixed(2) + "K";
      return n.toFixed(2);
    }

    async function fetchJson(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`请求失败: ${res.status} ${res.statusText}`);
      return res.json();
    }

    function destroyCharts() {
      if (volumeChart) volumeChart.destroy();
      if (changeChart) changeChart.destroy();
      if (scatterChart) scatterChart.destroy();
    }

    function updateCards(rows, totalUsdtCount) {
      document.getElementById("usdtCount").textContent = totalUsdtCount;
      document.getElementById("topCount").textContent = rows.length;
      document.getElementById("topSymbol").textContent = rows[0]?.symbol || "-";
      document.getElementById("lastUpdate").textContent = new Date().toLocaleString();
    }

    function buildCharts(rows) {
      destroyCharts();

      const labels = rows.map(x => x.symbol);
      const volumes = rows.map(x => x.quoteVolume);
      const changes = rows.map(x => x.priceChangePercent);

      const volumeCtx = document.getElementById("volumeChart");
      volumeChart = new Chart(volumeCtx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "24h 成交额",
            data: volumes
          }]
        },
        options: {
          indexAxis: "y",
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => ` 成交额: ${formatMoney(ctx.raw)}`
              }
            }
          },
          scales: {
            x: {
              ticks: {
                callback: (value) => formatMoney(value)
              }
            }
          }
        }
      });

      const changeCtx = document.getElementById("changeChart");
      changeChart = new Chart(changeCtx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "24h 涨跌幅 %",
            data: changes
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => ` 涨跌幅: ${toNum(ctx.raw).toFixed(2)}%`
              }
            }
          },
          scales: {
            y: {
              ticks: {
                callback: (value) => `${value}%`
              }
            }
          }
        }
      });

      const scatterCtx = document.getElementById("scatterChart");
      scatterChart = new Chart(scatterCtx, {
        type: "scatter",
        data: {
          datasets: [{
            label: "成交额 vs 涨跌幅",
            data: rows.map(x => ({
              x: x.quoteVolume,
              y: x.priceChangePercent,
              symbol: x.symbol
            }))
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          parsing: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const p = ctx.raw;
                  return `${p.symbol} | 成交额: ${formatMoney(p.x)} | 涨跌幅: ${toNum(p.y).toFixed(2)}%`;
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                callback: (value) => formatMoney(value)
              },
              title: {
                display: true,
                text: "24h 成交额"
              }
            },
            y: {
              title: {
                display: true,
                text: "24h 涨跌幅 %"
              },
              ticks: {
                callback: (value) => `${value}%`
              }
            }
          }
        }
      });
    }

    function mergeAndFilter(exchangeInfo, tickers24h, topN) {
      const tickersMap = new Map(tickers24h.map(t => [t.symbol, t]));

      const usdtTradingSymbols = exchangeInfo.symbols.filter(s =>
        s.quoteAsset === "USDT" &&
        s.status === "TRADING"
      );

      const rows = usdtTradingSymbols.map(s => {
        const t = tickersMap.get(s.symbol) || {};
        return {
          symbol: s.symbol,
          quoteAsset: s.quoteAsset,
          status: s.status,
          contractType: s.contractType,
          lastPrice: toNum(t.lastPrice),
          quoteVolume: toNum(t.quoteVolume),
          volume: toNum(t.volume),
          priceChangePercent: toNum(t.priceChangePercent)
        };
      });

      rows.sort((a, b) => b.quoteVolume - a.quoteVolume);

      return {
        totalUsdtCount: usdtTradingSymbols.length,
        topRows: rows.slice(0, topN)
      };
    }

    async function loadData() {
      const statusEl = document.getElementById("status");
      const topN = Number(document.getElementById("topN").value);

      statusEl.textContent = "正在加载 USDT 合约数据并生成图表...";

      try {
        const [exchangeInfo, tickers24h] = await Promise.all([
          fetchJson(`${API_BASE}/fapi/v1/exchangeInfo`),
          fetchJson(`${API_BASE}/fapi/v1/ticker/24hr`)
        ]);

        const { totalUsdtCount, topRows } = mergeAndFilter(exchangeInfo, tickers24h, topN);
        filteredRows = topRows;

        updateCards(topRows, totalUsdtCount);
        buildCharts(topRows);

        statusEl.textContent = `加载成功：已筛选 USDT 交易对，并展示成交额前 ${topRows.length} 名`;
      } catch (err) {
        console.error(err);
        statusEl.textContent = `加载失败：${err.message}`;
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", loadData);
    document.getElementById("topN").addEventListener("change", loadData);

    loadData();
  </script>
</body>
</html>
